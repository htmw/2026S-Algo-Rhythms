services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - notifyengine

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - notifyengine

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://notify:notify@postgres:5432/notifyengine
    volumes:
      - ./apps/ml-service:/app
      - mlmodels:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - notifyengine

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - notifyengine

volumes:
  pgdata:
  redisdata:
  mlmodels:

networks:
  notifyengine:
    driver: bridge
