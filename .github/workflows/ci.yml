name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  DATABASE_URL: postgresql://notify:notify@localhost:5433/notifyengine_test
  REDIS_URL: redis://localhost:6380
  ML_SERVICE_URL: http://localhost:8000
  NODE_ENV: test

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Check for .env files
        run: |
          if find . -name '.env' -not -path './node_modules/*' -not -path '*/node_modules/*' | grep -q .; then
            echo ".env file found in repo"
            find . -name '.env' -not -path './node_modules/*' -not -path '*/node_modules/*'
            exit 1
          fi
          echo "No .env files found"

      - name: Check for hardcoded secret patterns
        run: |
          VIOLATIONS=$(grep -rn \
            -e 'ne_live_[a-zA-Z0-9]' \
            -e 'AKIA[0-9A-Z]\{16\}' \
            -e 'BEGIN RSA PRIVATE KEY' \
            --include='*.ts' --include='*.py' --include='*.js' --include='*.json' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
            . 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "Potential secrets found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  node-tests:
    name: Node Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npx turbo run build

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: API tests
        run: npm test
        working-directory: apps/api
        env:
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ${{ secrets.MAILTRAP_USER }}
          SMTP_PASS: ${{ secrets.MAILTRAP_PASS }}

      - name: Worker tests
        run: npm test
        working-directory: apps/worker
        env:
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ${{ secrets.MAILTRAP_USER }}
          SMTP_PASS: ${{ secrets.MAILTRAP_PASS }}

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for ML service
        id: check-ml
        run: |
          if [ -f "apps/ml-service/requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ML service not yet created, skipping Python tests"
          fi

      - name: Setup Python 3.11
        if: steps.check-ml.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check-ml.outputs.exists == 'true'
        run: pip install -r apps/ml-service/requirements.txt

      - name: Safety check
        if: steps.check-ml.outputs.exists == 'true'
        run: |
          pip install safety
          safety check -r apps/ml-service/requirements.txt

      - name: pytest
        if: steps.check-ml.outputs.exists == 'true'
        run: |
          pip install pytest
          pytest
        working-directory: apps/ml-service

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [security-scan, node-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Docker Compose services
        run: docker compose up -d

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy\|running"; then
              echo "Services are up"
              break
            fi
            sleep 2
          done

      - name: Run migrations
        run: npx tsx infra/migrate.ts

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ${{ secrets.MAILTRAP_USER }}
          SMTP_PASS: ${{ secrets.MAILTRAP_PASS }}

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down -v
